<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026/6/6–6/7 Lalaport品牌活動出勤</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#F7F6F2;color:#1A1916;font-size:13px;}

/* 固定在最上方的區塊 */
.sticky-top{position:sticky;top:0;z-index:100;}

header{padding:1rem 1.5rem 0.75rem;background:#fff;border-bottom:1px solid #E0DDD5;}
.header-label{font-size:10px;letter-spacing:.12em;color:#9E9B95;text-transform:uppercase;margin-bottom:3px;}
h1{font-size:14px;font-weight:700;line-height:1.3;}
.accent-bar{width:24px;height:3px;background:#D4A843;border-radius:2px;margin-top:6px;}

.tabs{display:flex;background:#fff;border-bottom:2px solid #E0DDD5;padding:0.75rem 1.5rem 0;}
.tab-btn{padding:6px 18px 8px;font-size:12px;font-family:inherit;font-weight:500;color:#6B6760;background:transparent;border:1px solid transparent;border-bottom:none;border-radius:5px 5px 0 0;cursor:pointer;position:relative;bottom:-2px;transition:all .15s;}
.tab-btn:hover{color:#1A1916;background:#F7F6F2;}
.tab-btn.active{color:#F7F6F2;background:#1A1916;border-color:#E0DDD5;}

.tab-panel{display:none;padding:1.25rem 1.5rem 2.5rem;}
.tab-panel.active{display:block;}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1rem;font-size:11px;color:#6B6760;}
.legend-item{display:flex;align-items:center;gap:5px;}
.leg-box{width:20px;height:10px;border-radius:2px;}

/* 圖表區塊：時間軸固定 */
.chart-wrap{overflow-x:auto;}
.chart-inner{min-width:640px;position:relative;}

/* 固定時間軸列 */
.time-header-sticky{
  position:sticky;
  top:0; /* 會由 JS 動態設定，貼在 sticky-top 下方 */
  background:#F7F6F2;
  z-index:50;
  display:flex;
  padding:6px 0 4px;
  border-bottom:1px solid #E0DDD5;
  margin-bottom:4px;
}
.time-tick{flex:1;font-size:10px;color:#9E9B95;}

.group-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9E9B95;margin:14px 0 5px;padding-bottom:3px;border-bottom:1px solid #E0DDD5;}
.row{display:flex;align-items:center;margin-bottom:4px;height:24px;}
.track{flex:1;position:relative;height:22px;}
.bar,.bar-open,.bar-maybe{position:absolute;height:22px;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-sizing:border-box;}
.bar-open{border-style:dashed!important;border-width:1.5px!important;color:#6B6760;}
.bar-maybe{border-right-style:dashed!important;border-right-width:1.5px!important;}

.count-section{margin-top:16px;padding-top:12px;border-top:1px solid #E0DDD5;}
.count-label{font-size:10px;color:#9E9B95;letter-spacing:.04em;margin-bottom:4px;}
.slot-header{position:relative;height:16px;margin-bottom:2px;}
.slot-tick{position:absolute;font-size:9px;font-weight:600;color:#6B6760;transform:translateX(-50%);white-space:nowrap;}
.count-row{display:flex;}
.count-track{flex:1;position:relative;height:24px;}
.count-seg{position:absolute;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;border-right:1px solid rgba(255,255,255,.5);}

footer{text-align:center;padding:1.25rem;font-size:11px;color:#9E9B95;border-top:1px solid #E0DDD5;}
</style>
</head>
<body>

<div class="sticky-top" id="stickyTop">
  <header>
    <div class="header-label">品牌活動 · 人員出勤表</div>
    <h1>2026 / 6/6–6/7 Lalaport 品牌活動出勤</h1>
    <div class="accent-bar"></div>
  </header>
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('day1',this)">6/6（六）</button>
    <button class="tab-btn" onclick="switchTab('day2',this)">6/7（日）</button>
  </nav>
</div>

<div id="day1" class="tab-panel active"></div>
<div id="day2" class="tab-panel"></div>

<footer>2026 Lalaport 品牌活動 · 人員出勤班表</footer>

<script>
function switchTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  // 更新時間軸 sticky top
  setStickyTimeHeader();
}

function setStickyTimeHeader(){
  const stickyH = document.getElementById('stickyTop').offsetHeight;
  document.querySelectorAll('.time-header-sticky').forEach(el=>{
    el.style.top = stickyH + 'px';
  });
}

window.addEventListener('resize', setStickyTimeHeader);

const GROUP_COLORS=[
  ['#FDECC8','#E8B84B','#7A5200'],
  ['#D1ECF8','#5AABCF','#1A5470'],
  ['#D6F0E0','#52B07A','#1A5232'],
  ['#F9D9E8','#D96FA0','#7A1F4A'],
  ['#E8DAFA','#9B6DD6','#3D1878'],
  ['#FFE5D0','#F4874B','#7A3010'],
  ['#E2EDD4','#7BAE41','#334D12'],
];

function buildChart(containerId,startH,endH,groups){
  const T=endH-startH;
  function pL(h){return ((h-startH)/T*100).toFixed(2)+'%';}
  function pW(s,e){return ((e-s)/T*100).toFixed(2)+'%';}
  function fmt(h){return Math.floor(h)+':'+(h%1===.5?'30':'00');}

  let html=`<div class="legend">
    <span class="legend-item"><span class="leg-box" style="border:1px solid #999;background:#eee"></span>時間確定</span>
    <span class="legend-item"><span class="leg-box" style="border:1.5px dashed #999;background:#eee"></span>結束未定</span>
    <span class="legend-item"><span class="leg-box" style="border-top:1px solid #999;border-bottom:1px solid #999;border-left:1px solid #999;border-right:1.5px dashed #999;background:#eee"></span>可能延長</span>
  </div>`;

  html+=`<div class="chart-wrap"><div class="chart-inner">`;

  // 固定時間軸
  html+=`<div class="time-header-sticky">`;
  for(let h=startH;h<=endH;h++) html+=`<span class="time-tick">${Math.floor(h)}:00</span>`;
  html+=`</div>`;

  groups.forEach((g,gi)=>{
    const [bg,bd,tx]=GROUP_COLORS[gi%GROUP_COLORS.length];
    html+=`<div class="group-label">${g.label}</div>`;
    g.people.forEach(p=>{
      const endLabel=p.open?'???':fmt(p.e);
      const label=`${p.name}　${fmt(p.s)}–${endLabel}`;
      let cls,style;
      if(p.open){
        cls='bar-open';
        style=`left:${pL(p.s)};width:${pW(p.s,p.e)};background:${bg};border-color:${bd};color:${tx};`;
      } else if(p.maybe){
        cls='bar-maybe';
        style=`left:${pL(p.s)};width:${pW(p.s,p.e)};background:${bg};border-top:1px solid ${bd};border-bottom:1px solid ${bd};border-left:1px solid ${bd};border-right:1.5px dashed ${bd};color:${tx};`;
      } else {
        cls='bar';
        style=`left:${pL(p.s)};width:${pW(p.s,p.e)};background:${bg};border:1px solid ${bd};color:${tx};`;
      }
      html+=`<div class="row"><div class="track"><div class="${cls}" style="${style}" title="${label}">${label}</div></div></div>`;
    });
  });

  const all=[];
  groups.forEach((g,gi)=>g.people.forEach(p=>all.push({...p,gi})));

  html+=`<div class="count-section"><div class="count-label">各時段在場人數</div>`;
  html+=`<div class="slot-header">`;
  for(let h=startH;h<=endH;h++){
    const l=((h-startH)/T*100).toFixed(2)+'%';
    html+=`<span class="slot-tick" style="left:${l};">${Math.floor(h)}:00</span>`;
  }
  html+=`</div>`;

  html+=`<div class="count-row"><div class="count-track">`;
  for(let h=startH;h<endH;h+=0.5){
    const mid=h+0.25;
    const present={};
    all.forEach(p=>{if(p.s<=mid&&p.e>mid) present[p.gi]=true;});
    const count=all.filter(p=>p.s<=mid&&p.e>mid).length;
    const w=(0.5/T*100).toFixed(2)+'%';
    const l=((h-startH)/T*100).toFixed(2)+'%';
    const gIdxList=Object.keys(present).map(Number);
    let segBg='#EEECE8',segTx='#9E9B95';
    if(gIdxList.length>0){
      const dominant=gIdxList.reduce((best,gi)=>{
        const cnt=all.filter(p=>p.gi===gi&&p.s<=mid&&p.e>mid).length;
        return cnt>(best.cnt||0)?{gi,cnt}:best;
      },{});
      const [bg,,tx]=GROUP_COLORS[dominant.gi%GROUP_COLORS.length];
      segBg=bg; segTx=tx;
    }
    html+=`<div class="count-seg" style="left:${l};width:${w};background:${segBg};color:${count>0?segTx:'transparent'};" title="${fmt(h)} ${count}人">${count>0?count:''}</div>`;
  }
  html+=`</div></div></div></div></div>`;
  document.getElementById(containerId).innerHTML=html;
}

buildChart('day1',7.5,22.5,[
  {label:'7:30 早班',people:[
    {name:'怡如',s:7.5,e:22.5,open:true},{name:'玉珊',s:7.5,e:22.5,open:true},
  ]},
  {label:'8:30 班',people:[
    {name:'宜柔',s:8.5,e:16.5},{name:'筱昀',s:8.5,e:16.5},{name:'靜芸',s:8.5,e:16.5},{name:'拉拉',s:8.5,e:16.5},{name:'怡梅',s:8.5,e:16.5},
  ]},
  {label:'9:30 班',people:[
    {name:'鈺茹',s:9.5,e:13.5},{name:'瓊芳',s:9.5,e:16.5},{name:'秋如',s:9.5,e:16.5},{name:'昀萱',s:9.5,e:16.5},{name:'貞甄',s:9.5,e:16.5},{name:'育菱',s:9.5,e:16.5},{name:'詩雅',s:9.5,e:16.5},{name:'慧芬',s:9.5,e:16.5},
  ]},
  {label:'13:30 班',people:[
    {name:'傅暄',s:13.5,e:17.5},{name:'金葵',s:13.5,e:17.5},{name:'雅涵',s:13.5,e:17.5},{name:'雅怡',s:13.5,e:17.5},
  ]},
  {label:'14:00 班',people:[
    {name:'美齡',s:13.5,e:21.5},{name:'舒涵',s:14,e:21.5},{name:'品媛',s:14,e:21.5},{name:'Hana',s:14,e:21.5},{name:'Yuri',s:14,e:21.5},
  ]},
  {label:'15:30 班',people:[
    {name:'秀美',s:15.5,e:19.5},{name:'世芬',s:15.5,e:19.5},
  ]},
  {label:'15:00 晚班',people:[
    {name:'佳臻',s:15,e:22.5},{name:'明雯',s:15,e:22.5},{name:'安平',s:15,e:22.5},{name:'佳霖',s:15,e:22.5},{name:'美君',s:15,e:22.5},{name:'珮珊',s:15,e:22.5},{name:'心怡',s:15,e:22.5},{name:'巧惠',s:15,e:22.5},
  ]},
]);

buildChart('day2',9,22.5,[
  {label:'預計 9:00 早班',people:[
    {name:'小剛',s:9,e:22.5,open:true},{name:'惠琪',s:9,e:22.5,open:true},{name:'怡如',s:9,e:22.5,open:true},{name:'玉珊',s:9,e:22.5,open:true},
  ]},
  {label:'10:00 班',people:[
    {name:'佳臻',s:10,e:16.5},{name:'筱昀',s:10,e:16.5},{name:'鈺茹',s:10,e:16.5},{name:'傅暄',s:10,e:16.5},{name:'佳霖',s:10,e:16.5},{name:'秋如',s:10,e:16.5},{name:'美齡',s:10,e:16.5},{name:'昀萱',s:10,e:16.5},{name:'貞甄',s:10,e:16.5},{name:'少琪',s:10,e:16.5},{name:'雅怡',s:10,e:16.5},{name:'慧芬',s:10,e:16.5},
  ]},
  {label:'13:30 班',people:[
    {name:'金葵',s:13.5,e:17.5},{name:'雅涵',s:13.5,e:17.5},
  ]},
  {label:'14:00 班',people:[
    {name:'欣亭',s:13.5,e:21},{name:'舒涵',s:14,e:21.5},{name:'品媛',s:14,e:21.5},{name:'Hana',s:14,e:21.5},{name:'Yuri',s:14,e:21.5},
  ]},
  {label:'15:30 班',people:[
    {name:'秀美',s:15.5,e:19.5},
  ]},
  {label:'15:30 晚班（可能延長）',people:[
    {name:'宜柔',s:15.5,e:22,maybe:true},{name:'明雯',s:15.5,e:22,maybe:true},{name:'安平',s:15.5,e:22,maybe:true},{name:'拉拉',s:15.5,e:22,maybe:true},{name:'靜芸',s:15.5,e:22,maybe:true},{name:'怡梅',s:15.5,e:22,maybe:true},{name:'珮珊',s:15.5,e:22,maybe:true},{name:'心怡',s:15.5,e:22,maybe:true},{name:'巧惠',s:15.5,e:22,maybe:true},
  ]},
]);

// 設定時間軸 sticky top（在 buildChart 之後執行）
setTimeout(setStickyTimeHeader, 0);
</script>
</body>
</html>
